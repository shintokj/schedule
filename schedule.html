<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tournament Schedule</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: "Inter", Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }

    #container {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 16px;
    }

    .player-card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-name {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .stats {
      font-size: 14px;
      color: #6b7280;
    }

    .match {
      background: #f9fafb;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      border-left: 4px solid #2563eb;
    }

    .stage {
      font-size: 14px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 6px;
    }

    .teams {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .status {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .completed {
      background: #dcfce7;
      color: #166534;
    }

    .upcoming {
      background: #fef3c7;
      color: #92400e;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>🏸 Tournament Schedule</header>

<div id="container">
  <p id="loading">Loading schedule...</p>
</div>

<footer>
  Auto-refreshes every 20 seconds
</footer>

<script>
  const API_BASE = "https://benchmarkapi.onrender.com"; // <-- replace this
  const urlParams = new URLSearchParams(window.location.search);
  const tournamentId = urlParams.get("tournamentId");

  if (!tournamentId) {
    document.getElementById("loading").innerText = "Missing tournamentId in URL";
    throw new Error("Missing tournamentId");
  }

  async function loadSchedule() {
    try {
      const res = await fetch(`${API_BASE}/tournament/${tournamentId}/players-with-matches`);
      const data = await res.json();

      const container = document.getElementById("container");
      container.innerHTML = "";
      
      data.players.forEach(player => {
        const card = document.createElement("div");
        card.className = "player-card";

        const total = player.matches.length;
        const completed = player.matches.filter(m => m.scores).length;
        const upcoming = total - completed;

        card.innerHTML = `
          <div class="player-header">
            <div class="player-name">${player.teamName}</div>
            <div class="stats">
              Total: ${total} • Completed: ${completed} • Upcoming: ${upcoming}
            </div>
          </div>
        `;

        player.matches.forEach(match => {
          const status = match.scores ? "Completed" : "Upcoming";
          const statusClass = match.scores ? "completed" : "upcoming";

          card.innerHTML += `
            <div class="match">
              <div class="stage">${match.stage}</div>
              <div class="teams">
                ${match.team1.player1_name} & ${match.team1.player2_name} 
                vs 
                ${match.team2.player1_name} & ${match.team2.player2_name}
              </div>
              <div class="status ${statusClass}">${status}</div>
            </div>
          `;
        });

        container.appendChild(card);
      });

    } catch (err) {
      document.getElementById("loading").innerText = "Failed to load schedule";
      console.error(err);
    }
  }

  loadSchedule();

  // Auto-refresh every 20 seconds
  setInterval(loadSchedule, 20000);
</script>

</body>
</html>
