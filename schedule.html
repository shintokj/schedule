<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Player Fixtures</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter",
          sans-serif;
        margin: 0;
        background: #e5e7eb;
      }
      header {
        background: #2563eb;
        color: #fff;
        padding: 16px;
        text-align: center;
        font-weight: 700;
        font-size: 20px;
      }
      .page {
        max-width: 900px;
        margin: 16px auto 40px;
        padding: 0 12px;
      }
      .title {
        font-size: 22px;
        font-weight: 800;
        color: #111827;
      }
      .subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-top: 4px;
        margin-bottom: 12px;
      }
      .toggle-btn {
        margin-top: 10px;
        background-color: #111827;
        padding: 8px 14px;
        border-radius: 999px;
        color: #f9fafb;
        font-weight: 600;
        border: none;
        cursor: pointer;
      }
      .section-title {
        font-size: 18px;
        font-weight: 700;
        color: #111827;
        margin-top: 18px;
        margin-bottom: 8px;
      }
      .player-header-row {
        display: flex;
        justify-content: space-between;
        padding: 0 4px;
        margin-bottom: 4px;
        font-size: 13px;
        color: #6b7280;
        font-weight: 600;
      }
      .stats-compact-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .stat-header-compact {
        width: 24px;
        text-align: center;
      }
      .player-row-compact {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border-radius: 8px;
        background-color: #f9fafb;
        margin-bottom: 4px;
        cursor: pointer;
      }
      .player-name-compact {
        font-size: 14px;
        color: #111827;
        font-weight: 500;
      }
      .player-text-active {
        color: #2563eb;
      }
      .stat-compact {
        width: 24px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: #111827;
      }
      .stat-won-compact {
        color: #16a34a;
      }
      .stat-lost-compact {
        color: #dc2626;
      }
      .stats-card {
        display: flex;
        background-color: #111827;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
        margin-top: 6px;
        gap: 8px;
      }
      .stat-item {
        flex: 1;
        text-align: center;
      }
      .stat-label {
        font-size: 12px;
        color: #9ca3af;
      }
      .stat-value {
        font-size: 16px;
        font-weight: 700;
        color: #f9fafb;
        margin-top: 2px;
      }
      .stat-won {
        color: #4ade80;
      }
      .stat-lost {
        color: #fecaca;
      }
      .stat-upcoming {
        color: #facc15;
      }
      .card {
        background-color: #ffffff;
        border-radius: 10px;
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #e5e7eb;
      }
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .match-id {
        font-size: 13px;
        font-weight: 700;
        color: #111827;
      }
      .status {
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .status-completed {
        background-color: #dcfce7;
        color: #166534;
      }
      .status-upcoming {
        background-color: #e0f2fe;
        color: #075985;
      }
      .row {
        display: flex;
        margin-top: 8px;
        gap: 10px;
      }
      .team-col {
        flex: 1;
      }
      .team-name {
        font-size: 14px;
        font-weight: 600;
        color: #111827;
      }
      .team-winner {
        color: #16a34a;
      }
      .team-loser {
        color: #9ca3af;
      }
      .meta-row {
        display: flex;
        flex-wrap: wrap;
        margin-top: 8px;
        gap: 10px;
      }
      .meta {
        font-size: 11px;
        color: #6b7280;
      }
      .search-box {
        display: flex;
        align-items: center;
        background-color: #f3f4f6;
        border-radius: 999px;
        padding: 6px 12px;
        margin-top: 8px;
        gap: 8px;
      }
      .search-input {
        border: none;
        background: transparent;
        flex: 1;
        font-size: 14px;
        outline: none;
        color: #111827;
      }
      .player-item {
        padding: 8px;
        border-radius: 8px;
        background-color: #f9fafb;
        margin-top: 6px;
        cursor: pointer;
      }
      .player-text {
        font-size: 14px;
        color: #111827;
      }
      .tier-badge {
        margin-left: 6px;
        padding: 2px 10px;
        border-radius: 6px;
        font-size: 12px;
        min-width: 50px;
        text-align: center;
        color: #fff;
      }
      .tier-gold {
        background-color: #d4af37;
      }
      .tier-silver {
        background-color: #9ea7b8;
      }
    </style>
  </head>

  <body>
    <header
      style="
        background: #5695f5;
        padding: 0;
        height: 150px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      "
    >
      <img
        src="https://schedule.batmin10.com/batmin10.png"
        alt="App Logo"
        style="height: 90px; width: auto; object-fit: contain"
      />

      <div
        style="
          margin-top: 4px;
          font-size: 16px;
          font-weight: 700;
          color: #ffffff;
          letter-spacing: 0.5px;
        "
      >
        Complete Badminton Tournament Planner
      </div>
    </header>

    <div class="page">
      <div>
        <div class="title">Player fixtures</div>
        <div class="subtitle">Check player fixtures and results</div>
      </div>

      <button id="toggleViewBtn" class="toggle-btn" style="display: none">
        Show All Players
      </button>

      <div id="content"></div>
    </div>

    <script>
      const API_BASE = "https://benchmarkapi.onrender.com";
      const urlParams = new URLSearchParams(window.location.search);
      const tournamentId = urlParams.get("tournamentId");

      let allPlayers = [];
      let showFullList = true;
      let selectedFullListPlayerId = null;
      let searchText = "";
      let searchSelectedPlayerId = null;

      // -----------------------------
      // FIXED WINNER LOGIC (WORKS FOR BO3)
      // -----------------------------
      function getWinnerLoser(item) {
        const scores = item.scores;
        if (!scores) return { winner: null, loser: null };

        const s0 = scores["0"];
        const s1 = scores["1"];

        // SINGLE SET
        if (typeof s0 !== "object" && typeof s1 !== "object") {
          const t1 = Number(s0);
          const t2 = Number(s1);

          if (isNaN(t1) || isNaN(t2)) return { winner: null, loser: null };

          if (t1 > t2) return { winner: "team1", loser: "team2" };
          if (t2 > t1) return { winner: "team2", loser: "team1" };

          return { winner: null, loser: null };
        }

        // BEST OF 3
        let team1Sets = 0;
        let team2Sets = 0;

        Object.keys(scores).forEach((setKey) => {
          const set = scores[setKey];
          if (!set || typeof set !== "object") return;

          const a = Number(set["0"]);
          const b = Number(set["1"]);

          if (isNaN(a) || isNaN(b)) return;

          if (a > b) team1Sets++;
          else if (b > a) team2Sets++;
        });

        if (team1Sets > team2Sets) return { winner: "team1", loser: "team2" };
        if (team2Sets > team1Sets) return { winner: "team2", loser: "team1" };

        return { winner: null, loser: null };
      }

      // -----------------------------
      // OTHER HELPERS
      // -----------------------------
      function formatTeamName(team) {
        if (!team) return "-";
        const p1 = team.player1_name || "";
        const p2 = team.player2_name || "";
        return p1 && p2 ? `${p1} & ${p2}` : p1 || p2 || "-";
      }

      function extractAllSetScores(scores) {
        if (!scores || typeof scores !== "object") return [];
        return Object.keys(scores).map((k) => {
          const set = scores[k];
          if (!set) return "-";
          if (typeof set === "object") {
            return `${set["0"] ?? "-"} - ${set["1"] ?? "-"}`;
          }
          return String(set);
        });
      }

      function displayStage(stage) {
        const s = stage?.toUpperCase() || "";
        return (
          {
            GROUP: "Group Stage",
            PRE_QF: "Pre‑Quarter Final",
            QF: "Quarter Final",
            SF: "Semi Final",
            LOSERS_FINAL: "Losers Final",
            FINAL: "Final",
          }[s] || stage
        );
      }

      function getMatchResult(item) {
        const t1 = item.scores?.["0"];
        const t2 = item.scores?.["1"];
        if (t1 == null || t2 == null) return { label: "Upcoming" };
        return { label: "Completed" };
      }

      function computeStats(matches) {
        let total = matches.length;
        let won = 0;
        let lost = 0;
        let toPlay = 0;

        matches.forEach((m) => {
          const s0 = m.scores?.["0"];
          const s1 = m.scores?.["1"];
          if (s0 == null || s1 == null) {
            toPlay++;
            return;
          }
          const t1 = Number(s0);
          const t2 = Number(s1);
          if (m.player_side === "team1") {
            if (t1 > t2) won++;
            else lost++;
          } else {
            if (t2 > t1) won++;
            else lost++;
          }
        });

        return { total, won, lost, toPlay };
      }

      function sortMatchesByStage(matches) {
        const order = {
          GROUP: 1,
          PRE_QF: 2,
          QF: 3,
          SF: 4,
          LOSERS_FINAL: 5,
          FINAL: 6,
        };
        return [...matches].sort((a, b) => {
          const sa = order[a.stage] || 99;
          const sb = order[b.stage] || 99;
          if (sa !== sb) return sa - sb;
          return (a.match_number ?? 0) - (b.match_number ?? 0);
        });
      }

      // -----------------------------
      // MATCH CARD
      // -----------------------------
      function renderMatchItem(match) {
        const { label } = getMatchResult(match);
        const { winner, loser } = getWinnerLoser(match);
        const setScores = extractAllSetScores(match.scores);

        const card = document.createElement("div");
        card.className = "card";

        const headerRow = document.createElement("div");
        headerRow.className = "header-row";

        const matchId = document.createElement("div");
        matchId.className = "match-id";
        matchId.textContent = match.match_number
          ? `Match #${match.match_number} • ${displayStage(match.stage)}`
          : displayStage(match.stage);

        const status = document.createElement("div");
        status.className =
          "status " +
          (label === "Completed" ? "status-completed" : "status-upcoming");
        status.textContent = label;

        headerRow.appendChild(matchId);
        headerRow.appendChild(status);
        card.appendChild(headerRow);

        const row = document.createElement("div");
        row.className = "row";

        const team1Col = document.createElement("div");
        team1Col.className = "team-col";
        const t1 = document.createElement("div");
        t1.className = "team-name";
        if (winner === "team1") t1.classList.add("team-winner");
        if (loser === "team1") t1.classList.add("team-loser");
        t1.textContent = formatTeamName(match.team1);
        team1Col.appendChild(t1);

        const team2Col = document.createElement("div");
        team2Col.className = "team-col";
        const t2 = document.createElement("div");
        t2.className = "team-name";
        if (winner === "team2") t2.classList.add("team-winner");
        if (loser === "team2") t2.classList.add("team-loser");
        t2.textContent = formatTeamName(match.team2);
        team2Col.appendChild(t2);

        row.appendChild(team1Col);
        row.appendChild(team2Col);
        card.appendChild(row);

        if (setScores.length > 0) {
          const scoresRow = document.createElement("div");
          scoresRow.style.display = "flex";
          scoresRow.style.flexWrap = "wrap";
          scoresRow.style.marginTop = "10px";

          setScores.forEach((score) => {
            const chip = document.createElement("div");
            chip.style.backgroundColor = "#f3f4f6";
            chip.style.padding = "6px 10px";
            chip.style.borderRadius = "8px";
            chip.style.marginRight = "8px";
            chip.style.marginBottom = "8px";
            chip.style.border = "1px solid #e5e7eb";

            const txt = document.createElement("div");
            txt.style.fontSize = "14px";
            txt.style.fontWeight = "700";
            txt.style.color = "#111827";
            txt.textContent = score;

            chip.appendChild(txt);
            scoresRow.appendChild(chip);
          });

          card.appendChild(scoresRow);
        }

        const metaRow = document.createElement("div");
        metaRow.className = "meta-row";

        if (match.tournament_groups?.name) {
          const g = document.createElement("div");
          g.className = "meta";
          g.textContent = `Group: ${match.tournament_groups.name}`;
          metaRow.appendChild(g);
        }
        if (match.court) {
          const c = document.createElement("div");
          c.className = "meta";
          c.textContent = `Court: ${match.court}`;
          metaRow.appendChild(c);
        }
        if (match.start_time) {
          const s = document.createElement("div");
          s.className = "meta";
          s.textContent = `Start: ${match.start_time}`;
          metaRow.appendChild(s);
        }

        card.appendChild(metaRow);
        return card;
      }

      // -----------------------------
      // RENDER
      // -----------------------------
      function render() {
        const content = document.getElementById("content");
        content.innerHTML = "";

        const toggleBtn = document.getElementById("toggleViewBtn");
        toggleBtn.style.display = "inline-block";
        toggleBtn.textContent = showFullList
          ? "Show Player View"
          : "Show All Players";

        // -----------------------------
        // FULL LIST MODE
        // -----------------------------
        if (showFullList) {
          const title = document.createElement("div");
          title.className = "section-title";
          title.textContent = "All Players";
          content.appendChild(title);

          const headerRow = document.createElement("div");
          headerRow.className = "player-header-row";
          headerRow.innerHTML = `
            <div>Player</div>
            <div class="stats-compact-row">
              <div class="stat-header-compact">T</div>
              <div class="stat-header
